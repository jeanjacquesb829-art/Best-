<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Loading Screen</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial;
}

/* écran de chargement plein écran */
#loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:white;
display:flex;
justify-content:center;
align-items:center;
}

/* taille de l'image */
#loading img{
width:150px;
}

</style>

</head>

<body>

<div id="loading">
<img src="images/IMG_9811.jpeg" alt="loading">
</div>

<script>

setTimeout(function(){
document.getElementById("loading").style.display="none";
},3000);
