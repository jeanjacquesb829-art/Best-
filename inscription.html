<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Inscription</title>
<style>

body{
margin:0;
padding:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#0a3d62,#1e5799,#2989d8);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* boite inscription */
.signup-box{
background:white;
padding:40px;
border-radius:18px;
width:90%;
max-width:360px;
text-align:center;
box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

/* titre */
.signup-box h2{
font-size:30px;
font-weight:bold;
margin-bottom:20px;
color:#0a3d62;
}

/* champs */
.signup-box input{
width:100%;
padding:15px;
margin:10px 0;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
font-weight:bold;
box-sizing:border-box;
}

/* bouton */
.signup-box button{
width:100%;
padding:16px;
background:#0a3d62;
color:white;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

/* lien retour */
.back{
display:block;
margin-top:15px;
font-size:15px;
font-weight:bold;
color:#0a3d62;
text-decoration:none;
}

.back:hover{
text-decoration:underline;
  }

</style>
</head>
<body>
<div class="signup-box">
<h2>Créer un compte</h2>
<input type="text" placeholder="Nom">
<input type="text" placeholder="Prénom">
<input type="email" placeholder="Adresse email">
<input type="tel" placeholder="Téléphone">
<input type="password" placeholder="Mot de passe">
</div>
</body>
</html>
